services:
  # FastAPI Backend Service
  backend:
    build:
      context: ./fhir-backend-dynamic
      dockerfile: Dockerfile
    container_name: fhir-backend-prod
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - FHIR_BASE_URL=${FHIR_BASE_URL:-https://hapi.fhir.org/baseR4/}
      - ENABLE_DOCS=0
    volumes:
      - ./config.yaml:/config.yaml:ro
    networks:
      - fhir-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # React Frontend Service
  frontend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: fhir-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fhir-network
    command: serve -s build -l 3000
    restart: unless-stopped

networks:
  fhir-network:
    driver: bridge

volumes:
  config_volume:
    driver: local


